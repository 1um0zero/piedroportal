<!--
  ============================================================================
  OLD PORTAL — "Grand Opening" countdown → thank-you page  (HEAD-SAFE)
  ============================================================================
  Built entirely from JavaScript, so it is safe to APPEND directly BELOW the
  Google tag in the existing `headbottom.html` content snippet (renders in
  <head> on every page).

  Two phases, no DNS dependency:
    • BEFORE opening — full-screen overlay + live countdown; blocks all
      interaction (scroll/clicks/keys) so nobody uses the old portal.
    • AT / AFTER opening — the overlay morphs into a thank-you / info screen
      with a single button to the NEW portal (no auto-redirect, so the user
      chooses when to go — and it never loops while DNS is still propagating).

  Configure the four constants at the top of the <script>.
  ============================================================================
-->
<script>
(function () {
  // ── CONFIGURE ─────────────────────────────────────────────────────────────
  // Opening instant. Amsterdam is CEST (UTC+02:00) in June — keep the offset.
  var OPENING        = new Date('2026-06-15T00:00:00+02:00').getTime();
  // Where "go to the portal" leads. Use the real piedro.pt domain — never *.vercel.app.
  var NEW_PORTAL_URL = 'https://portal2.piedro.pt/';
  // Button label. Jorge's "Vamos!" or a neutral NL label — your call.
  var BUTTON_LABEL   = 'Naar het portaal →';
  // ──────────────────────────────────────────────────────────────────────────

  function pad(n){ return (n<10?'0':'')+n; }
  function isOpen(){ return Date.now() >= OPENING; }

  // Inject styles once.
  var css = document.createElement('style');
  css.textContent =
    'html.po-locked,body.po-locked{overflow:hidden !important;}' +
    '#po-overlay{position:fixed;inset:0;z-index:2147483647;display:flex;' +
      'align-items:center;justify-content:center;background:#f5f4f2;color:#1e1b18;' +
      'font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}' +
    '#po-overlay .po-card{text-align:center;padding:2rem;max-width:560px;}' +
    '#po-overlay .po-logo{height:84px;width:auto;margin:0 auto 2rem;display:block;}' +
    '#po-overlay h1{font-size:2rem;font-weight:700;margin:0 0 .5rem;letter-spacing:-.02em;}' +
    '#po-overlay .po-sub{font-size:1.05rem;color:#57534e;line-height:1.5;margin:0 0 2rem;}' +
    '#po-overlay .po-clock{display:flex;gap:1rem;justify-content:center;}' +
    '#po-overlay .po-clock>div{min-width:72px;background:#fff;border-radius:14px;padding:1rem .5rem;' +
      'box-shadow:0 2px 4px rgba(0,0,0,.04),0 8px 16px rgba(0,0,0,.08);}' +
    '#po-overlay .po-clock span{display:block;font-size:2rem;font-weight:700;font-variant-numeric:tabular-nums;color:#B8975A;}' +
    '#po-overlay .po-clock small{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#a8a29e;}' +
    '#po-overlay .po-cta{display:inline-block;margin-top:.5rem;padding:.85rem 2rem;border-radius:12px;' +
      'background:#B8975A;color:#fff;font-size:1rem;font-weight:600;text-decoration:none;' +
      'box-shadow:0 2px 4px rgba(0,0,0,.06),0 8px 16px rgba(0,0,0,.10);}' +
    '#po-overlay .po-cta:hover{background:#9A7A42;}' +
    '#po-overlay .po-foot{margin-top:2.5rem;font-size:.8rem;color:#a8a29e;}';

  var overlay = document.createElement('div');
  overlay.id = 'po-overlay';
  overlay.setAttribute('aria-live', 'polite');

  // ── Phase 1: countdown markup ──────────────────────────────────────────────
  function countdownHTML(){
    return '<div class="po-card">' +
      '<img class="po-logo" src="/brand/piedro-logo.svg" alt="Piedro International" onerror="this.style.display=\'none\'">' +
      '<h1>We are getting ready</h1>' +
      '<p class="po-sub">Het nieuwe Piedro-portaal opent zo meteen.<br>' +
        'The new Piedro portal opens shortly.</p>' +
      '<div class="po-clock">' +
        '<div><span id="po-d">00</span><small>dagen</small></div>' +
        '<div><span id="po-h">00</span><small>uur</small></div>' +
        '<div><span id="po-m">00</span><small>min</small></div>' +
        '<div><span id="po-s">00</span><small>sec</small></div>' +
      '</div>' +
      '<p class="po-foot">Piedro International B.V. — always one step ahead</p>' +
    '</div>';
  }

  // ── Phase 2: thank-you / info markup ───────────────────────────────────────
  function thankYouHTML(){
    return '<div class="po-card">' +
      '<img class="po-logo" src="/brand/piedro-logo.svg" alt="Piedro International" onerror="this.style.display=\'none\'">' +
      '<h1>Welkom in het nieuwe portaal</h1>' +
      '<p class="po-sub">' +
        'Het nieuwe Piedro-portaal is open. Uw account en bestelgeschiedenis ' +
        'zijn bewaard gebleven — bij uw <strong>eerste aanmelding</strong> vragen ' +
        'wij u eenmalig een nieuw wachtwoord in te stellen.' +
        '<br><br>' +
        '<span style="color:#78716c">The new Piedro portal is open. Your account and ' +
        'order history have been preserved — on your <strong>first sign-in</strong> ' +
        'you will be asked to set a new password.</span>' +
      '</p>' +
      '<a class="po-cta" href="' + NEW_PORTAL_URL + '">' + BUTTON_LABEL + '</a>' +
      '<p class="po-foot">Piedro International B.V. — always one step ahead</p>' +
    '</div>';
  }

  var timer = null;

  function startCountdown(){
    overlay.innerHTML = countdownHTML();
    var d=document.getElementById('po-d'), h=document.getElementById('po-h'),
        m=document.getElementById('po-m'), s=document.getElementById('po-s');
    function tick(){
      if (isOpen()){ clearInterval(timer); showThankYou(); return; }
      var sec = Math.floor((OPENING - Date.now())/1000);
      d.textContent = pad(Math.floor(sec/86400));
      h.textContent = pad(Math.floor(sec%86400/3600));
      m.textContent = pad(Math.floor(sec%3600/60));
      s.textContent = pad(sec%60);
    }
    tick();
    timer = setInterval(tick, 1000);
  }

  function showThankYou(){
    overlay.innerHTML = thankYouHTML();
  }

  function mount(){
    document.head.appendChild(css);
    document.documentElement.classList.add('po-locked');
    document.body.classList.add('po-locked');
    document.body.appendChild(overlay);

    // Block interaction behind the overlay (the CTA link still works).
    ['keydown','wheel','touchmove'].forEach(function(ev){
      document.addEventListener(ev, function(e){
        if (overlay.contains(e.target)) return; // allow interaction inside the card
        e.preventDefault();
      }, { passive:false, capture:true });
    });

    if (isOpen()) showThankYou();
    else startCountdown();
  }

  if (document.body) mount();
  else document.addEventListener('DOMContentLoaded', mount);
})();
</script>
