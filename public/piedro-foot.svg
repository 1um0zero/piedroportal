<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Stylised foot/sole from the Piedro logo: horizontal bars forming a foot shape -->
  <!-- Toe area (top) -->
  <rect x="42" y="2"  width="18" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="38" y="10" width="26" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="34" y="18" width="32" height="5" rx="2.5" fill="#B0BEC5"/>
  <!-- Ball area -->
  <rect x="28" y="26" width="44" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="24" y="34" width="48" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="22" y="42" width="50" height="5" rx="2.5" fill="#B0BEC5"/>
  <!-- Arch (narrowing) -->
  <rect x="26" y="50" width="38" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="30" y="58" width="30" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="28" y="66" width="32" height="5" rx="2.5" fill="#B0BEC5"/>
  <!-- Heel area (widening) -->
  <rect x="26" y="74" width="38" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="28" y="82" width="34" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="32" y="90" width="26" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="36" y="98" width="18" height="5" rx="2.5" fill="#B0BEC5"/>
  <rect x="40" y="106" width="10" height="5" rx="2.5" fill="#B0BEC5"/>
</svg>
